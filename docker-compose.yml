version: '3.8'

services:
  app:
    build: .
    container_name: tga-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - /var/jenkins_home/envs/tga-backend.env
    environment:
      - NODE_ENV=production
    volumes:
      - ./uploads:/app/uploads
      - /tmp/uploads:/tmp/uploads
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  proxy:
    external: true
